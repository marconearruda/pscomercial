<div class="card solution-card" data-category="{{category}}">
  <div class="card-icon">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <!-- Substituir por ícone real via JS -->
      <rect x="3" y="3" width="18" height="18" rx="2"/>
    </svg>
  </div>
  <span class="badge">{{category}}</span>
  <h3>{{title}}</h3>
  <p>{{summary}}</p>
  <a href="./pages/contato.html" class="btn btn-outline card-cta">{{cta}}</a>
</div>
