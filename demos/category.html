<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demonstrações – Polímata</title>
  <meta name="description" content="Demonstrações interativas organizadas por categoria.">

  <script>
  // Defina manualmente a base do projeto. Para Live Server, use '/'. Para GitHub Pages, use '/pscomercial/' ou '/pscomercial-main/'.
  window.PROJECT_BASE = '/'; // Ajuste conforme seu ambiente
  </script>

  <script src="../js/core/paths.js"></script>
  <script src="../js/core/init.js"></script>

  <link rel="icon" href="../assets/icons/favicon.ico">
  <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="../manifest/manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages.css">

  <style>
    .category-header {
      text-align: center;
      padding: var(--space-4) 0;
    }
    .category-header h1 {
      font-size: 2.5rem;
      margin-bottom: var(--space-2);
    }
    .category-header p {
      max-width: 700px;
      margin: 0 auto var(--space-4);
      color: var(--muted);
    }
    .demo-grid-category {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: var(--space-6);
      margin-top: var(--space-6);
    }
    .demo-card-item {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      border: 1px solid var(--border);
      transition: all var(--duration-medium) var(--ease-emphasized);
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
      min-height: 280px;
    }
    .demo-card-item:hover {
      transform: translateY(-4px);
      border-color: var(--accent-lime);
      box-shadow: var(--shadow-md);
    }
    .demo-card-item .demo-icon {
      font-size: 3rem;
      margin-bottom: var(--space-3);
      display: block;
    }
    .demo-card-item h3 {
      font-size: 1.1rem;
      margin-bottom: var(--space-2);
      word-break: break-word;
    }
    .demo-card-item p {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: var(--space-4);
      flex-grow: 1;
    }
    .demo-card-item .btn {
      width: 100%;
      margin-top: auto;
    }
    .back-link {
      display: inline-block;
      margin-bottom: var(--space-4);
      color: var(--accent-lime);
      font-weight: 600;
    }
    .back-link:hover {
      text-decoration: underline;
    }
    @media (max-width: 768px) {
      .demo-grid-category {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: var(--space-4);
      }
      .demo-card-item {
        min-height: 220px;
        padding: var(--space-4);
      }
      .demo-card-item .demo-icon {
        font-size: 2.2rem;
      }
    }
  </style>
</head>
<body>
  <!-- ===== NAVBAR (CARREGADO DINAMICAMENTE) ===== -->
  <div id="navbar-placeholder"></div>

  <main>
    <section class="section">
      <div class="container">
        <a href="index.html" class="back-link">← Voltar ao catálogo</a>
        <div class="category-header">
          <h1 id="category-title">Carregando...</h1>
          <p id="category-desc">Carregando demonstrações...</p>
        </div>
        <div class="demo-grid-category" id="demos-grid-category">
          <!-- Preenchido via JavaScript -->
        </div>
        <div class="demo-cta-list" style="text-align:center;padding:var(--space-6);background:var(--surface-light);border-radius:var(--radius-lg);margin-top:var(--space-6);border:1px solid var(--border);">
          <h2>Pronto para levar essa solução ao seu projeto?</h2>
          <p>Entre em contato e descubra como a Polímata pode criar uma experiência digital sob medida para você.</p>
          <a href="../pages/contato.html" class="btn btn-primary">Solicitar uma versão para meu projeto</a>
        </div>
      </div>
    </section>
  </main>

  <!-- ===== FOOTER (CARREGADO DINAMICAMENTE) ===== -->
  <div id="footer-placeholder"></div>

  <!-- ===== SCRIPTS ===== -->
  <script src="../js/spm.js"></script>
  <script type="module" src="../js/app.js"></script>
  <script type="module">
    import { renderDemosByCategory } from '../js/catalog.js';

    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const categoryId = params.get('cat');
      if (!categoryId) {
        document.getElementById('category-title').textContent = 'Categoria não especificada';
        document.getElementById('category-desc').textContent = 'Selecione uma categoria no catálogo.';
        return;
      }
      renderDemosByCategory('#demos-grid-category', categoryId);
    });
  </script>
</body>
</html>
