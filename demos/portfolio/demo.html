<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PortfólioPRO – Demo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../../css/tokens.css">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/components.css">

  <style>
    .demo-portfolio {
      padding: var(--space-6) 0;
      background: var(--bg);
    }
    .demo-portfolio .hero {
      text-align: center;
      padding: var(--space-8) 0;
      background: linear-gradient(135deg, var(--bg), var(--surface));
    }
    .demo-portfolio .hero h1 {
      font-size: 2.8rem;
    }
    .demo-portfolio .hero p {
      color: var(--muted);
      font-size: 1.2rem;
    }
    .demo-portfolio .hero .tagline {
      color: var(--accent-lime);
      font-size: 1.5rem;
      margin: var(--space-2) 0;
    }
    .demo-portfolio .section-title {
      font-size: 1.8rem;
      margin-bottom: var(--space-4);
    }
    .demo-portfolio .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: var(--space-4);
    }
    .demo-portfolio .social-links {
      display: flex;
      gap: var(--space-4);
      margin-top: var(--space-3);
    }
    .demo-portfolio .social-links a {
      color: var(--muted);
      padding: var(--space-2) var(--space-4);
      background: var(--surface);
      border-radius: var(--radius-full);
      border: 1px solid var(--border);
      text-decoration: none;
    }
    .demo-portfolio .social-links a:hover {
      color: var(--text);
      border-color: var(--accent-lime);
    }
  </style>
</head>
<body>
  <div class="demo-portfolio">
    <!-- Hero -->
    <section class="hero">
      <div class="container">
        <h1>João Designer</h1>
        <p class="tagline">Criando experiências digitais que conectam</p>
        <p>UI/UX Designer & Desenvolvedor Front-End</p>
        <a href="#" class="btn btn-primary" style="margin-top: var(--space-4);">Ver projetos</a>
      </div>
    </section>

    <!-- Serviços -->
    <section class="section">
      <div class="container">
        <h2 class="section-title">💼 Serviços</h2>
        <div id="services-list" class="grid">
          <!-- Preenchido via JS -->
        </div>
      </div>
    </section>

    <!-- Projetos -->
    <section class="section" style="background: var(--surface);">
      <div class="container">
        <h2 class="section-title">📌 Projetos</h2>
        <div id="projects-list" class="grid">
          <!-- Preenchido via JS -->
        </div>
      </div>
    </section>

    <!-- Depoimentos -->
    <section class="section">
      <div class="container">
        <h2 class="section-title">💬 Depoimentos</h2>
        <div id="testimonials-list" class="grid">
          <!-- Preenchido via JS -->
        </div>
      </div>
    </section>

    <!-- Contato -->
    <section class="section" style="background: var(--surface);">
      <div class="container">
        <h2 class="section-title">📬 Contato</h2>
        <div id="contact-info" style="padding:var(--space-4);background:var(--bg);border-radius:var(--radius-md);">
          <!-- Preenchido via JS -->
        </div>
      </div>
    </section>
  </div>

  <script>
    const data = {
      services: [
        { title: 'UI Design', description: 'Interfaces visuais modernas e funcionais.' },
        { title: 'UX Design', description: 'Jornadas centradas no usuário.' },
        { title: 'Desenvolvimento Front-End', description: 'Código limpo e otimizado.' }
      ],
      projects: [
        { title: 'E-commerce de Moda', description: 'Plataforma completa com PWA.' },
        { title: 'App de Saúde', description: 'Aplicativo para acompanhamento médico.' }
      ],
      testimonials: [
        { author: 'Maria Oliveira', role: 'CEO, Moda Store', quote: 'João transformou nossa presença digital.' },
        { author: 'Dr. Pedro Santos', role: 'Médico', quote: 'App intuitivo e bem projetado.' }
      ],
      contact: {
        email: 'joao@joaodesigner.com',
        phone: '(11) 77777-7777',
        social: {
          linkedin: 'https://linkedin.com/',
          instagram: 'https://instagram.com/'
        }
      }
    };

    function renderServices() {
      const container = document.getElementById('services-list');
      if (!container) return;
      container.innerHTML = data.services.map(item => `
        <div class="card">
          <h3>${item.title}</h3>
          <p>${item.description}</p>
        </div>
      `).join('');
    }

    function renderProjects() {
      const container = document.getElementById('projects-list');
      if (!container) return;
      container.innerHTML = data.projects.map(item => `
        <div class="card">
          <h3>${item.title}</h3>
          <p>${item.description}</p>
          <a href="#" class="btn btn-secondary">Ver projeto</a>
        </div>
      `).join('');
    }

    function renderTestimonials() {
      const container = document.getElementById('testimonials-list');
      if (!container) return;
      container.innerHTML = data.testimonials.map(item => `
        <div class="card">
          <p>"${item.quote}"</p>
          <p><strong>${item.author}</strong><br />${item.role}</p>
        </div>
      `).join('');
    }

    function renderContact() {
      const container = document.getElementById('contact-info');
      if (!container) return;
      container.innerHTML = `
        <p><strong>Email:</strong> ${data.contact.email}</p>
        <p><strong>Telefone:</strong> ${data.contact.phone}</p>
        <div class="social-links">
          ${Object.entries(data.contact.social).map(([key, url]) => `<a href="${url}" target="_blank" rel="noopener">${key.charAt(0).toUpperCase() + key.slice(1)}</a>`).join('')}
        </div>
      `;
    }

    renderServices();
    renderProjects();
    renderTestimonials();
    renderContact();
  </script>
</body>
</html>
